name: Tidyly
options:
  bundleIdPrefix: com.tidyly
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "4"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright (c) 2026 Tidyly. All rights reserved."
targets:
  Tidyly:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Tidyly
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: Tidyly/Resources
        excludes:
          - "Info.plist"
    entitlements:
      path: Tidyly/Tidyly.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tidyly.jonesweb.club
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.tidyly.jonesweb.club
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.tidyly.jonesweb.club
    dependencies:
      - target: TidylyWidget
        embed: true
        platformFilters: [iOS]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tidyly.jonesweb.club
        PRODUCT_NAME: Tidyly
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: VS4RFZ5734
        INFOPLIST_KEY_CFBundleDisplayName: Tidyly
        INFOPLIST_KEY_CKSharingSupported: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIBackgroundModes: "remote-notification"
        INFOPLIST_KEY_CFBundleURLTypes: '[{"CFBundleURLName":"com.tidyly.jonesweb.club","CFBundleURLSchemes":["tidyly"]}]'
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright (c) 2026 Tidyly. All rights reserved."
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPAD_IPHONE: NO
        configs:
          Debug:
            SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          Release:
            SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
  TidylyWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TidylyWidget
        excludes:
          - Info.plist
          - TidylyWidget.entitlements
      - path: Tidyly/Models/WidgetSnapshot.swift
    info:
      path: TidylyWidget/Info.plist
      properties:
        CFBundleDisplayName: Tidyly
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TidylyWidget/TidylyWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tidyly.jonesweb.club
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tidyly.jonesweb.club.widget
        PRODUCT_NAME: TidylyWidget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VS4RFZ5734
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
